    <main class="container mt-5 mb-5">
        <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
            <div class="col-md-5">
                <div class="silik-arkaplan p-5 rounded shadow-lg">
                    
                    <div class="text-center mb-4">
                        <h2 class="fw-bold renkli-baslik">Giriş Yap</h2>
                        <p class="text-muted small">Lütfen öğrenci bilgilerinizle giriş yapın.</p>
                    </div>

                    <div id="hataKutusu" class="alert alert-danger py-2 small text-center d-none" role="alert">
                        Kullanıcı adı veya şifre hatalı!
                    </div>

                    <form action="login_sonuc.php" method="POST" onsubmit="return loginKontrol()">
                        
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold small">E-Posta Adresi</label>
                            <input type="text" class="form-control" id="email" name="email" placeholder="x*********@ogr.sakarya.edu.tr">
                        </div>

                        <div class="mb-4">
                            <label for="sifre" class="form-label fw-bold small">Şifre (Öğrenci No)</label>
                            <input type="password" class="form-control" id="sifre" name="sifre" placeholder="**********">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary fw-bold shadow-sm py-2">Giriş Yap</button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 1. PHP'DEN GELEN HATAYI YAKALAMA (URL'de ?hata=1 varsa kutuyu göster)
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('hata')) {
                document.getElementById('hataKutusu').classList.remove('d-none');
            }
        };

        // 2. FORM BOŞ MU, MAİL FORMATI DOĞRU MU KONTROLÜ
        function loginKontrol() {
            let email = document.getElementById('email').value.trim();
            let sifre = document.getElementById('sifre').value.trim();
            let emailKurali = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (email === "" || sifre === "") {
                alert("Lütfen e-posta ve şifre alanlarını boş bırakmayınız!");
                return false;
            }

            if (!emailKurali.test(email)) {
                alert("Lütfen geçerli bir e-posta formatı giriniz!");
                return false;
            }

            return true; 
        }
    </script>
