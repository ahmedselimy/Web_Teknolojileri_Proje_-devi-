<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="medya/favicon.png">
    <!-- VUE.JS -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>

     <!-- NAVBAR kısmı --->

            <a class="navbar-brand" href="index.html">

            </a> 

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- Menü Linkleri -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Hakkımda</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="ozgecmis.html">Özgeçmiş</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sehrim.html">Şehrim</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="mirasimiz.html">Mirasımız</a>
                    </li>

                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ANA İÇERİK -->
    <main class="container mt-5 mb-5" id="app">
        
        <div class="text-center mb-5 silik-arkaplan p-4 rounded shadow-sm">
            <h1 class="display-5 fw-bold renkli-baslik">İletişim</h1>
            <p class="text-muted mt-2">Benimle İletişime Geçin</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="silik-arkaplan p-4 rounded shadow-sm">
                    
                    <!-- Tarayıcı doğrulamasını kapattık çünkü denetimi JS ile yapacağız -->
                    <form id="iletisimFormu" novalidate>
                        
                        <!-- 1. Ad Soyad Kutusu -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Adınız Soyadınız</label>
                            <!-- Vue için v-model, Vanilla JS için id kullanıyoruz -->
                            <input type="text" class="form-control" id="ad" v-model="form.ad" placeholder="Ad Soyad">
                        </div>

                        <!-- 2. E-Posta Kutusu -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">E-Posta Adresiniz</label>
                            <input type="text" class="form-control" id="email" v-model="form.email" placeholder="ornek@gmail.com">
                        </div>

                        <!-- 3. Telefon Kutusu -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Telefon Numaranız (Sadece Rakam)</label>
                            <input type="text" class="form-control" id="telefon" v-model="form.telefon" placeholder="05xxxxxxxxx" maxlength="11">
                        </div>

                        <!-- 4. Cinsiyet Radio Button -->
                        <div class="mb-3">
                            <label class="form-label fw-bold d-block">Cinsiyet</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek" v-model="form.cinsiyet">
                                <label class="form-check-label" for="erkek">Erkek</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="kadın" value="Kadın" v-model="form.cinsiyet">
                                <label class="form-check-label" for="kadın">Kadın</label>
                            </div>
                        </div>

                        <!-- 5. Konu Select -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Konu</label>
                            <select class="form-select" id="konu" v-model="form.konu">
                                <option value="">Lütfen bir konu seçiniz...</option>
                                <option value="Yazılım">Yazılım Projesi</option>
                                <option value="Okul">Okul / Akademik</option>
                                <option value="Diğer">Diğer</option>
                            </select>
                        </div>

                        <!-- 6. Mesaj Textarea -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mesajınız</label>
                            <textarea class="form-control" id="mesaj" rows="3" v-model="form.mesaj" placeholder="Mesajınızı yazınız..."></textarea>
                        </div>

                        <!-- 7. Onay Checkbox -->
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="onay" v-model="form.onay">
                            <label class="form-check-label text-muted" for="onay">
                                Bilgilerimin doğruluğunu kabul ediyorum.
                            </label>
                        </div>

                        <!-- İKİ FARKLI DENETİM BUTONU -->
                        <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                            <!-- Buton 1: JavaScript Kontrolü -->
                            <button type="button" class="btn btn-warning px-4 fw-bold shadow-sm" onclick="vanillaJSDenetle()">
                                Gönder 🛠️ (Vanilla JS)
                            </button>
                            
                            <!-- Buton 2: Vue.js Framework Kontrolü -->
                            <button type="button" class="btn btn-success px-4 fw-bold shadow-sm" @click="vueJSDenetle()">
                                Gönder ⚡ (Vue.js)
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-4 mt-auto shadow-lg">
        <div class="container">
            <p class="mb-0 text-secondary">&copy; 2026 Ahmed Selim Yılmaz | Tüm hakları saklıdır</p>
        </div>
    </footer>

    <!-- ======================================================== -->
    <!-- JAVASCRIPT KONTROL KODLARI (HEM VANILLA HEM VUE.JS) -->
    <!-- ======================================================== -->
    <script>
        // --- 1. VANILLA (SAF) JAVASCRIPT DENETİM FONKSİYONU ---
        function vanillaJSDenetle() {
            // HTML elemanlarını ID ile çekiyoruz
            let ad = document.getElementById('ad').value.trim();
            let email = document.getElementById('email').value.trim();
            let telefon = document.getElementById('telefon').value.trim();
            let konu = document.getElementById('konu').value;
            let mesaj = document.getElementById('mesaj').value.trim();
            let onay = document.getElementById('onay').checked;
            
            // Radio button seçilmiş mi kontrolü
            let cinsiyetSecili = document.querySelector('input[name="cinsiyet"]:checked');

            // Regex Kuralları
            let emailKurali = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let telefonKurali = /^[0-9]{10,11}$/; // Sadece rakam ve 10-11 hane

            // Denetimler
            if (ad === "") { alert("Vanilla JS Hatası: Ad Soyad alanı boş bırakılamaz!"); return; }
            if (!emailKurali.test(email)) { alert("Vanilla JS Hatası: Geçerli bir E-posta adresi giriniz!"); return; }
            if (!telefonKurali.test(telefon)) { alert("Vanilla JS Hatası: Telefon numarası sadece rakamlardan oluşmalı ve 10-11 hane olmalıdır!"); return; }
            if (!cinsiyetSecili) { alert("Vanilla JS Hatası: Lütfen cinsiyetinizi seçiniz!"); return; }
            if (konu === "") { alert("Vanilla JS Hatası: Lütfen bir konu seçiniz!"); return; }
            if (mesaj === "") { alert("Vanilla JS Hatası: Mesaj alanı boş bırakılamaz!"); return; }
            if (!onay) { alert("Vanilla JS Hatası: Bilgilerin doğruluğunu onaylamalısınız!"); return; }

            alert("✅ Vanilla JS Doğrulaması Başarılı! Mesajınız İletildi.");
        }

        // --- 2. VUE.JS (FRAMEWORK) DENETİM MOTORU ---
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    // Form verilerini Vue modeline bağlıyoruz (v-model)
                    form: { ad: '', email: '', telefon: '', cinsiyet: '', konu: '', mesaj: '', onay: false }
                }
            },
            methods: {
                vueJSDenetle() {
                    // Regex Kuralları
                    const emailKurali = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    const telefonKurali = /^[0-9]{10,11}$/;

                    // Vue Modeli üzerinden (this.form) denetimler
                    if (!this.form.ad.trim()) { alert("Vue.js Hatası: Lütfen adınızı giriniz!"); return; }
                    if (!emailKurali.test(this.form.email.trim())) { alert("Vue.js Hatası: Geçerli bir E-posta adresi giriniz!"); return; }
                    if (!telefonKurali.test(this.form.telefon.trim())) { alert("Vue.js Hatası: Telefon numarası sadece rakamlardan oluşmalı ve 10-11 hane olmalıdır!"); return; }
                    if (!this.form.cinsiyet) { alert("Vue.js Hatası: Lütfen cinsiyetinizi seçiniz!"); return; }
                    if (!this.form.konu) { alert("Vue.js Hatası: Lütfen bir konu seçiniz!"); return; }
                    if (!this.form.mesaj.trim()) { alert("Vue.js Hatası: Mesaj alanı boş bırakılamaz!"); return; }
                    if (!this.form.onay) { alert("Vue.js Hatası: Bilgilerin doğruluğunu onaylamalısınız!"); return; }

                    alert("✅ Vue.js Doğrulaması Başarılı! Mesajınız İletildi.");
                }
            }
        }).mount('#app'); // Vue motorunu id="app" olan ana kapsayıcıya bağlıyoruz
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
