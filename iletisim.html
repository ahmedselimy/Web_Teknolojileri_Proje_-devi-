    <main class="container mt-5 mb-5" id="app">
        
        <div class="text-center mb-5 silik-arkaplan p-4 rounded shadow-sm">
            <h1 class="display-5 fw-bold renkli-baslik">İletişim</h1>
            <p class="text-muted mt-2">Benimle İletişime Geçin</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="silik-arkaplan p-4 rounded shadow-sm">
                    
                    <form id="iletisimFormu" action="iletisim_sonuc.php" method="POST" novalidate>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Adınız Soyadınız</label>
                            <input type="text" class="form-control" name="ad" id="ad" v-model="form.ad" placeholder="Ad Soyad">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">E-Posta Adresiniz</label>
                            <input type="text" class="form-control" name="email" id="email" v-model="form.email" placeholder="ornek@gmail.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Telefon Numaranız (Sadece Rakam)</label>
                            <input type="text" class="form-control" name="telefon" id="telefon" v-model="form.telefon" placeholder="05xxxxxxxxx" maxlength="11">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold d-block">Cinsiyetiniz</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek" v-model="form.cinsiyet">
                                <label class="form-check-label" for="erkek">Erkek</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadın" v-model="form.cinsiyet">
                                <label class="form-check-label" for="kadin">Kadın</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Konu</label>
                            <select class="form-select" name="konu" id="konu" v-model="form.konu">
                                <option value="">Lütfen bir konu seçiniz...</option>
                                <option value="Öneri">Öneri</option>
                                <option value="Okul / Akademik">Okul / Akademik</option>
                                <option value="Diğer">Diğer</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mesajınız</label>
                            <textarea class="form-control" name="mesaj" id="mesaj" rows="3" v-model="form.mesaj" placeholder="Mesajınızı yazınız..."></textarea>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" name="onay" value="Evet" id="onay" v-model="form.onay">
                            <label class="form-check-label text-muted" for="onay">
                                Bilgilerimin doğruluğunu kabul ediyorum.
                            </label>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                            <button type="button" class="btn btn-warning px-4 fw-bold shadow-sm" onclick="vanillaJSIleGonder()">
                                Vanilla JS ile Gönder
                            </button>
                            
                            <button type="button" class="btn btn-success px-4 fw-bold shadow-sm" @click="vueJSIleGonder()">
                                Vue.js ile Gönder
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>

    <footer class="bg-dark text-white text-center py-4 mt-auto shadow-lg">

    <script>
        // --- 1. VANILLA JS KONTROL ---
        function vanillaJSIleGonder() {
            let ad = document.getElementById('ad').value.trim();
            let email = document.getElementById('email').value.trim();
            let telefon = document.getElementById('telefon').value.trim();
            let konu = document.getElementById('konu').value;
            let mesaj = document.getElementById('mesaj').value.trim();
            let onay = document.getElementById('onay').checked;
            
            // Cinsiyet Kontrolü
            let cinsiyetSecili = document.querySelector('input[name="cinsiyet"]:checked');

            let emailKurali = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let telefonKurali = /^[0-9]{10,11}$/;

            if (ad === "") { alert("Vanilla JS: Ad Soyad alanı boş bırakılamaz!"); return; }
            if (!emailKurali.test(email)) { alert("Vanilla JS: Geçerli bir E-posta adresi giriniz!"); return; }
            if (!telefonKurali.test(telefon)) { alert("Vanilla JS: Telefon numarası sadece rakamlardan oluşmalı ve 10-11 hane olmalıdır!"); return; }
            if (!cinsiyetSecili) { alert("Vanilla JS: Lütfen cinsiyetinizi seçiniz!"); return; }
            if (konu === "") { alert("Vanilla JS: Lütfen bir konu seçiniz!"); return; }
            if (mesaj === "") { alert("Vanilla JS: Mesaj alanı boş bırakılamaz!"); return; }
            if (!onay) { alert("Vanilla JS: Bilgilerin doğruluğunu onaylamalısınız!"); return; }

            document.getElementById('iletisimFormu').submit();
        }

        // --- 2. VUE.JS KONTROL ---
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    form: { ad: '', email: '', telefon: '', cinsiyet: '', konu: '', mesaj: '', onay: false }
                }
            },
            methods: {
                vueJSIleGonder() {
                    const emailKurali = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    const telefonKurali = /^[0-9]{10,11}$/;

                    if (!this.form.ad.trim()) { alert("Vue.js: Lütfen adınızı giriniz!"); return; }
                    if (!emailKurali.test(this.form.email.trim())) { alert("Vue.js: E-Posta formatı hatalı!"); return; }
                    if (!telefonKurali.test(this.form.telefon.trim())) { alert("Vue.js: Telefon alanına sadece geçerli rakamlar giriniz!"); return; }
                    if (!this.form.cinsiyet) { alert("Vue.js: Radio button (Cinsiyet) seçimi yapmadınız!"); return; }
                    if (!this.form.konu) { alert("Vue.js: Lütfen listeden konu seçiniz!"); return; }
                    if (!this.form.mesaj.trim()) { alert("Vue.js: Lütfen mesajınızı yazınız!"); return; }
                    if (!this.form.onay) { alert("Vue.js: Checkbox (Onay) işaretlenmelidir!"); return; }

                    document.getElementById('iletisimFormu').submit();
                }
            }
        }).mount('#app');
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
